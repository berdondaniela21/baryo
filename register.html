<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Baryo</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { brand: { blue: '#13408c', darkblue: '#10367a', yellow: '#facc15' } }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900 min-h-screen flex flex-col">

    <nav class="bg-white py-4 px-6 md:px-12 flex justify-between items-center shadow-sm">
        <a href="index.html" class="navbar-brand flex items-center gap-3">
            <img src="img/baryo_logo.png" alt="Baryo Logo" class="h-10 w-auto object-contain">
        </a>
        <a href="login.html" class="text-sm font-medium text-gray-500 hover:text-brand-blue transition">Already have an account? Login</a>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="max-w-2xl w-full">
            <div class="bg-white p-8 md:p-10 rounded-2xl border border-gray-100 shadow-xl">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold font-serif text-brand-blue mb-2">Create Account</h1>
                    <p class="text-gray-500 text-sm">Join your local community portal to access digital services.</p>
                </div>

                <!-- Role Selector -->
                <div class="grid grid-cols-2 gap-3 mb-8">
                    <button id="tab-resident" onclick="switchTab('resident')" class="flex items-center justify-center gap-2 p-4 rounded-2xl border-2 border-brand-blue bg-brand-blue text-white transition-all font-bold">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        Resident
                    </button>
                    <button id="tab-admin" onclick="switchTab('admin')" class="flex items-center justify-center gap-2 p-4 rounded-2xl border-2 border-gray-100 bg-white text-gray-400 hover:border-yellow-400 hover:text-yellow-600 transition-all font-bold">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                        Admin
                    </button>
                </div>

                <!-- ===== RESIDENT FORM ===== -->
                <form id="form-resident" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Full Name</label>
                            <input type="text" id="res-fullName" required placeholder="Juan Dela Cruz" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Contact Number</label>
                            <input type="tel" id="res-contact" required placeholder="0912 345 6789" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Email Address</label>
                        <input type="email" id="res-email" required placeholder="juan@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition">
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Select Your Barangay</label>
                        <input type="text" id="res-bSearch" autocomplete="off" onkeyup="filterB('res')" placeholder="Search barangay..." class="w-full px-4 py-3 rounded-t-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition">
                        <div class="border border-gray-100 rounded-b-xl bg-white overflow-hidden">
                            <ul id="res-bList" class="max-h-40 overflow-y-auto p-2 text-sm text-gray-700"></ul>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Home Address</label>
                        <input type="text" id="res-address" required placeholder="House #, Street Name" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Password</label>
                            <input type="password" id="res-password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Confirm Password</label>
                            <input type="password" id="res-confirmPassword" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition">
                        </div>
                    </div>

                    <button type="submit" id="res-regBtn" class="w-full bg-brand-blue text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-blue/20 hover:bg-brand-darkblue transition flex items-center justify-center gap-2">
                        <span>Register as Resident</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    </button>
                </form>

                <!-- ===== ADMIN FORM ===== -->
                <form id="form-admin" class="space-y-5 hidden">
                    <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4 flex items-start gap-3">
                        <svg class="w-5 h-5 text-yellow-600 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                        <p class="text-xs text-yellow-700 font-medium leading-relaxed">For authorized barangay officials only. All submissions are recorded and verified.</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Full Name</label>
                            <input type="text" id="adm-fullName" placeholder="Juan Dela Cruz" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Contact Number</label>
                            <input type="tel" id="adm-contact" placeholder="0912 345 6789" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Official Email</label>
                        <input type="email" id="adm-email" placeholder="official@barangay.gov.ph" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Position / Title</label>
                            <select id="adm-position" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition text-sm text-gray-700">
                                <option value="">Select position</option>
                                <option value="Barangay Captain">Barangay Captain</option>
                                <option value="Kagawad">Kagawad</option>
                                <option value="Barangay Secretary">Barangay Secretary</option>
                                <option value="Barangay Treasurer">Barangay Treasurer</option>
                                <option value="SK Chairman">SK Chairman</option>
                                <option value="Barangay Health Worker">Barangay Health Worker</option>
                                <option value="Tanod">Barangay Tanod</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Barangay ID No.</label>
                            <input type="text" id="adm-barangayId" placeholder="e.g. BRY-74-2026" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Assigned Barangay</label>
                        <input type="text" id="adm-bSearch" autocomplete="off" onkeyup="filterB('adm')" placeholder="Search barangay..." class="w-full px-4 py-3 rounded-t-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition">
                        <div class="border border-gray-100 rounded-b-xl bg-white overflow-hidden">
                            <ul id="adm-bList" class="max-h-40 overflow-y-auto p-2 text-sm text-gray-700"></ul>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Office Address</label>
                        <input type="text" id="adm-address" placeholder="Barangay Hall Address" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Password</label>
                            <input type="password" id="adm-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Confirm Password</label>
                            <input type="password" id="adm-confirmPassword" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-yellow-400/30 transition">
                        </div>
                    </div>

                    <button type="submit" id="adm-regBtn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                        <span>Register as Admin</span>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-500">Already have an account? <a href="login.html" class="text-brand-blue font-black hover:underline ml-1">Login</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const totalBarangays = 897;
        const barangays = Array.from({ length: totalBarangays }, (_, i) => `Barangay ${i + 1}`);

        window.switchTab = function(tab) {
            const resForm = document.getElementById('form-resident');
            const admForm = document.getElementById('form-admin');
            const resTab = document.getElementById('tab-resident');
            const admTab = document.getElementById('tab-admin');

            if (tab === 'resident') {
                resForm.classList.remove('hidden');
                admForm.classList.add('hidden');
                resTab.className = 'flex items-center justify-center gap-2 p-4 rounded-2xl border-2 border-brand-blue bg-brand-blue text-white transition-all font-bold';
                admTab.className = 'flex items-center justify-center gap-2 p-4 rounded-2xl border-2 border-gray-100 bg-white text-gray-400 hover:border-yellow-400 hover:text-yellow-600 transition-all font-bold';
            } else {
                admForm.classList.remove('hidden');
                resForm.classList.add('hidden');
                admTab.className = 'flex items-center justify-center gap-2 p-4 rounded-2xl border-2 border-yellow-400 bg-yellow-50 text-yellow-700 transition-all font-bold';
                resTab.className = 'flex items-center justify-center gap-2 p-4 rounded-2xl border-2 border-gray-100 bg-white text-gray-400 hover:border-brand-blue hover:text-brand-blue transition-all font-bold';
                renderB('adm');
            }
        };

        function renderB(prefix, items) {
            const list = document.getElementById(`${prefix}-bList`);
            const source = items || barangays;
            list.innerHTML = source.map(name =>
                `<li onclick="selectB('${prefix}','${name}')" class="hover:bg-brand-blue/5 hover:text-brand-blue cursor-pointer transition-colors px-4 py-2.5 border-b border-gray-50 last:border-0 rounded-lg">${name}</li>`
            ).join('');
        }

        window.filterB = function(prefix) {
            const q = document.getElementById(`${prefix}-bSearch`).value.toLowerCase();
            const filtered = barangays.filter(b => b.toLowerCase().includes(q));
            renderB(prefix, filtered.length ? filtered : []);
            if (!filtered.length) {
                document.getElementById(`${prefix}-bList`).innerHTML = '<li class="text-gray-400 p-4 text-center text-sm">No results found</li>';
            }
        };

        window.selectB = function(prefix, name) {
            document.getElementById(`${prefix}-bSearch`).value = name;
            document.getElementById(`${prefix}-bList`).innerHTML = '';
            const input = document.getElementById(`${prefix}-bSearch`);
            input.classList.add('ring-2', 'ring-green-400');
            setTimeout(() => input.classList.remove('ring-green-400'), 1000);
        };

        renderB('res');
    </script>

    <script type="module">
        import { supabase } from './supabase-config.js';

        // --- RESIDENT REGISTRATION ---
        document.getElementById('form-resident').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('res-regBtn');

            const email    = document.getElementById('res-email').value.trim();
            const password = document.getElementById('res-password').value;
            const confirm  = document.getElementById('res-confirmPassword').value;
            const fullName = document.getElementById('res-fullName').value.trim();
            const contact  = document.getElementById('res-contact').value.trim();
            const barangay = document.getElementById('res-bSearch').value.trim();
            const address  = document.getElementById('res-address').value.trim();

            if (password !== confirm) return alert('Passwords do not match.');
            if (!barangay || !barangay.startsWith('Barangay')) return alert('Please select a valid barangay from the list.');

            const barangayNumber = barangay.replace(/\D/g, '');
            const uniqueId = Math.floor(1000 + Math.random() * 9000);
            const generatedCode = `${barangayNumber}-${uniqueId}-${new Date().getFullYear()}`;

            btn.disabled = true;
            btn.querySelector('span').innerText = 'Processing...';

            const { data: authData, error: authError } = await supabase.auth.signUp({
                email, password,
                options: { data: { role: 'resident' } }
            });
            if (authError) {
                alert('Error: ' + authError.message);
                btn.disabled = false;
                btn.querySelector('span').innerText = 'Register as Resident';
                return;
            }

            if (authData.user) {
                const { error: profileError } = await supabase.from('profiles').upsert({
                    id: authData.user.id,
                    full_name: fullName,
                    email: email,
                    contact_number: contact,
                    barangay: barangay,
                    barangay_code: generatedCode,
                    address: address,
                    role: 'resident'
                });

                if (profileError) {
                    alert('Account created but profile save failed: ' + profileError.message);
                } else {
                    alert(`Registration successful! Welcome to Baryo.\nYour Resident ID: ${generatedCode}`);
                    window.location.href = 'login.html';
                }
            }

            btn.disabled = false;
            btn.querySelector('span').innerText = 'Register as Resident';
        });

        // --- ADMIN REGISTRATION ---
        document.getElementById('form-admin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('adm-regBtn');

            const email     = document.getElementById('adm-email').value.trim();
            const password  = document.getElementById('adm-password').value;
            const confirm   = document.getElementById('adm-confirmPassword').value;
            const fullName  = document.getElementById('adm-fullName').value.trim();
            const contact   = document.getElementById('adm-contact').value.trim();
            const position  = document.getElementById('adm-position').value;
            const barangayId = document.getElementById('adm-barangayId').value.trim();
            const barangay  = document.getElementById('adm-bSearch').value.trim();
            const address   = document.getElementById('adm-address').value.trim();

            if (!fullName || !email || !password || !position || !barangayId || !barangay) {
                return alert('Please fill in all fields.');
            }
            if (password !== confirm) return alert('Passwords do not match.');
            if (!barangay.startsWith('Barangay')) return alert('Please select a valid barangay from the list.');

            const barangayNumber = barangay.replace(/\D/g, '');
            const generatedCode = `ADM-${barangayNumber}-${Math.floor(1000 + Math.random() * 9000)}-${new Date().getFullYear()}`;

            btn.disabled = true;
            btn.querySelector('span').innerText = 'Processing...';

            const { data: authData, error: authError } = await supabase.auth.signUp({
                email, password,
                options: { data: { role: 'pending_admin' } }
            });
            if (authError) {
                alert('Error: ' + authError.message);
                btn.disabled = false;
                btn.querySelector('span').innerText = 'Register as Admin';
                return;
            }

            if (authData.user) {
                const { error: profileError } = await supabase.from('profiles').upsert({
                    id: authData.user.id,
                    full_name: fullName,
                    email: email,
                    contact_number: contact,
                    barangay: barangay,
                    barangay_code: generatedCode,
                    address: address,
                    role: 'pending_admin',
                    position: position,
                    barangay_id_no: barangayId
                });

                if (profileError) {
                    alert('Account created but profile save failed: ' + profileError.message);
                } else {
                    alert(`Registration submitted!\n\nYour application is now pending approval from the Barangay Captain.\nYou will be able to log in once your account has been verified.\n\nStaff Code: ${generatedCode}`);
                    window.location.href = 'login.html';
                }
            }

            btn.disabled = false;
            btn.querySelector('span').innerText = 'Register as Admin';
        });
    </script>
</body>
</html>
