<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management | Baryo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { 
                        brand: { blue: '#13408c', darkblue: '#10367a', yellow: '#facc15' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900 flex min-h-screen">

    <aside class="w-72 bg-brand-blue text-white hidden lg:flex flex-col sticky top-0 h-screen shadow-2xl">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-2">
                <div class="bg-white p-1 rounded-lg overflow-hidden flex items-center justify-center w-10 h-10">
                    <a href="../index.html">
                        <img src="../img/baryo_logo.png" alt="Baryo Logo" class="w-full h-full object-contain">
                    </a>
                </div>
                <span class="font-bold text-2xl tracking-tight">Baryo</span>
            </div>
            <p class="text-white/40 text-[10px] uppercase tracking-[0.2em] font-bold">Admin Management</p>
        </div>

        <nav class="flex-grow px-4 space-y-1">
            <a href="admin.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Dashboard
            </a>
            <a href="admin_residents.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Residents
            </a>
            <a href="admin_permits.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Certificates & Permits
            </a>
            <a href="admin_announcements.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>
                Announcements
            </a>
            <a href="admin_events.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Events
            </a>
            <a href="staff.html" class="flex items-center gap-3 px-4 py-3.5 bg-white/10 rounded-xl font-semibold text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Staff
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <button id="logoutBtn" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500/10 text-red-400 font-bold rounded-xl hover:bg-red-500 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Log Out
            </button>
        </div>
    </aside>

    <main class="flex-grow overflow-y-auto">
        <header class="bg-white border-b border-gray-200 px-8 py-6 sticky top-0 z-10">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold font-serif text-brand-blue">Staff Directory</h1>
                    <p class="text-sm text-gray-500">Manage officials, secretaries, and system responders.</p>
                </div>
                <a href="staff_reg.html" class="bg-brand-yellow text-brand-darkblue px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-yellow-500/20 hover:scale-105 transition active:scale-95 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    Add Staff Member
                </a>
            </div>
        </header>

        <div class="p-8 max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <div class="relative flex-grow">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input type="text" placeholder="Search by name, role, or ID..." class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-brand-blue focus:outline-none transition shadow-sm">
                </div>
                <select id="role-filter" class="bg-white border border-gray-200 px-6 py-3 rounded-2xl text-sm font-medium focus:ring-2 focus:ring-brand-blue outline-none shadow-sm">
                    <option value="">All Roles</option>
                    <option value="Barangay Captain">Barangay Captain</option>
                    <option value="Kagawad">Kagawad</option>
                    <option value="Barangay Secretary">Barangay Secretary</option>
                    <option value="Barangay Treasurer">Barangay Treasurer</option>
                    <option value="SK Chairman">SK Chairman</option>
                    <option value="Barangay Health Worker">Barangay Health Worker</option>
                    <option value="Tanod">Barangay Tanod</option>
                </select>
            </div>

            <div id="staff-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <p class="text-gray-400 text-sm col-span-3 text-center py-10">Loading staff...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '../supabase-config.js';

        // Auth guard
        const { data: { user } } = await supabase.auth.getUser();
        if (!user || user.user_metadata?.role !== 'admin') {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        }

        // Get admin's barangay number from their profile
        const { data: adminProfile } = await supabase
            .from('profiles')
            .select('barangay_code, barangay')
            .eq('id', user.id)
            .single();
        const barangayNum = parseInt(adminProfile?.barangay_code?.split('-')[0])
            || parseInt((adminProfile?.barangay || '').replace(/\D/g, ''))
            || 74;

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        });

        let allStaff = [];

        async function loadStaff() {
            const { data, error } = await supabase
                .from('profiles')
                .select('id, full_name, position, email, barangay, contact_number')
                .eq('role', 'admin')
                .ilike('barangay_code', `${barangayNum}-%`)
                .order('full_name', { ascending: true });

            if (error) { console.error(error); return; }
            allStaff = data || [];
            renderStaff();
        }

        function renderStaff() {
            const search = document.querySelector('input[placeholder="Search by name, role, or ID..."]').value.toLowerCase();
            const roleFilter = document.getElementById('role-filter').value;

            const filtered = allStaff.filter(s => {
                const matchSearch = !search || (s.full_name || '').toLowerCase().includes(search);
                const matchRole = !roleFilter || s.position === roleFilter;
                return matchSearch && matchRole;
            });

            const grid = document.getElementById('staff-grid');
            if (filtered.length === 0) {
                grid.innerHTML = '<p class="text-gray-400 text-sm col-span-3 text-center py-10">No staff members found.</p>';
                return;
            }

            grid.innerHTML = filtered.map(s => {
                const initials = (s.full_name || '?').split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
                return `
                <div class="bg-white border border-gray-100 p-6 rounded-3xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300 group">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-16 h-16 rounded-2xl bg-brand-blue/10 flex items-center justify-center text-brand-blue text-2xl font-bold group-hover:bg-brand-blue group-hover:text-white transition-colors">
                            ${initials}
                        </div>
                        <span class="px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold uppercase tracking-wider rounded-full">Active</span>
                    </div>
                    <h3 class="font-bold text-lg text-gray-900 mb-1">${s.full_name || '—'}</h3>
                    <p class="text-sm text-gray-500 font-medium mb-1 flex items-center gap-1.5">
                        <svg class="w-4 h-4 text-brand-blue shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        ${s.position || 'Staff'}
                    </p>
                    <div class="pt-4 border-t border-gray-50 flex justify-between items-center">
                        <div>
                            <p class="text-[11px] text-gray-400 font-medium">${s.email || ''}</p>
                            <p class="text-[11px] text-gray-400 font-medium">${s.contact_number || ''}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        document.querySelector('input[placeholder="Search by name, role, or ID..."]').addEventListener('input', renderStaff);
        document.getElementById('role-filter').addEventListener('change', renderStaff);

        loadStaff();
    </script>
</body>
</html>
