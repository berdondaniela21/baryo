<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements | Baryo Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { brand: { blue: '#13408c', darkblue: '#10367a', yellow: '#facc15' } }
                }
            }
        }
    </script>

    <style>
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900 flex min-h-screen">

    <aside class="w-72 bg-brand-blue text-white hidden lg:flex flex-col sticky top-0 h-screen shadow-2xl">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-2">
                <div class="bg-white p-1 rounded-lg overflow-hidden flex items-center justify-center w-10 h-10">
                    <a href="../index.html">
                        <img src="../img/baryo_logo.png" alt="Baryo Logo" class="w-full h-full object-contain">
                    </a>
                </div>
                <span class="font-bold text-2xl tracking-tight">Baryo</span>
            </div>
            <p class="text-white/40 text-[10px] uppercase tracking-[0.2em] font-bold">Admin Management</p>
        </div>

        <nav class="flex-grow px-4 space-y-1">
            <a href="admin.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Dashboard
            </a>
            <a href="admin_residents.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Residents
            </a>
            <a href="admin_permits.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Certificates & Permits
            </a>
            <a href="admin_announcements.html" class="flex items-center gap-3 px-4 py-3.5 bg-white/10 rounded-xl font-semibold text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>
                Announcements
            </a>
            <a href="admin_events.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Events
            </a>
            <a href="staff.html" class="flex items-center gap-3 px-4 py-3.5 text-white/60 hover:text-white hover:bg-white/5 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Staff
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <button id="logoutBtn" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500/10 text-red-400 font-bold rounded-xl hover:bg-red-500 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Log Out
            </button>
        </div>
    </aside>

    <main class="flex-grow">
        <header class="bg-white border-b border-gray-100 py-4 px-8 flex justify-between items-center sticky top-0 z-30">
            <div>
                <h2 class="text-xl font-bold font-serif text-brand-blue">Community Announcements</h2>
                <p class="text-xs text-gray-400 font-medium">Broadcast news and alerts to all residents</p>
            </div>
        </header>

        <div class="p-8 max-w-4xl mx-auto space-y-8">

            <!-- Composer -->
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl space-y-4">
                <div class="flex justify-between items-center mb-1">
                    <div class="flex items-center gap-2 text-brand-blue">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"></path></svg>
                        <span class="font-bold text-xs uppercase tracking-wider">Announcement Composer</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="urgent-toggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
                        <span class="ml-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Mark as Urgent</span>
                    </label>
                </div>

                <input id="post-title" type="text" placeholder="Title of Announcement" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-blue/20 text-sm font-semibold">

                <select id="post-category" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-blue/20 text-sm font-medium text-gray-700">
                    <option value="General">General</option>
                    <option value="Health">Health</option>
                    <option value="Governance">Governance</option>
                    <option value="Events">Events</option>
                    <option value="Infrastructure">Infrastructure</option>
                    <option value="Social Services">Social Services</option>
                </select>

                <textarea id="post-content" rows="4" placeholder="What would you like to share?" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-blue/20 text-sm leading-relaxed"></textarea>

                <div class="flex justify-end">
                    <button id="post-btn" class="bg-brand-blue text-white px-8 py-3 rounded-xl text-xs font-bold shadow-lg shadow-brand-blue/20 transition-all active:scale-95">
                        Post Announcement
                    </button>
                </div>
            </div>

            <hr class="border-gray-100">

            <!-- Feed -->
            <div id="announcement-feed" class="space-y-4">
                <div class="flex justify-center py-10">
                    <div class="flex flex-col items-center gap-3 text-gray-400">
                        <svg class="w-8 h-8 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <p class="text-sm">Loading announcements...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { supabase } from '../supabase-config.js';

        let editTargetId = null;
        let barangayNum = 74;

        function renderCard(item) {
            const isUrgent = item.is_urgent;
            const tagClass = isUrgent
                ? 'bg-red-100 text-red-700 border-red-200'
                : 'bg-brand-blue/5 text-brand-blue border-brand-blue/10';
            const tagText = isUrgent ? `Urgent · ${item.category}` : item.category;
            const dateStr = new Date(item.created_at).toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric'
            });

            return `
                <div id="card-${item.id}" class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-3 animate-slide-up">
                    <div class="flex justify-between items-start">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider border ${tagClass}">${tagText}</span>
                        <span class="text-[10px] text-gray-400 font-medium">${dateStr}</span>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 font-serif">${item.title}</h3>
                    <p class="text-sm text-gray-600 leading-relaxed">${item.content || ''}</p>
                    <div class="flex gap-4 border-t border-gray-50 mt-4 pt-4">
                        <button data-id="${item.id}" class="edit-btn text-[10px] font-bold text-brand-blue hover:underline uppercase tracking-widest">Edit</button>
                        <button data-id="${item.id}" class="delete-btn text-[10px] font-bold text-red-500 hover:underline uppercase tracking-widest">Delete</button>
                    </div>
                </div>`;
        }

        async function loadAnnouncements() {
            const feed = document.getElementById('announcement-feed');
            const { data, error } = await supabase
                .from('announcements')
                .select('*')
                .eq('barangay_number', barangayNum)
                .order('created_at', { ascending: false });

            if (error) {
                feed.innerHTML = '<p class="text-red-400 text-sm text-center py-10">Failed to load announcements.</p>';
                return;
            }
            if (!data || data.length === 0) {
                feed.innerHTML = '<p class="text-gray-400 text-sm text-center py-10">No announcements yet. Use the composer above to post one.</p>';
                return;
            }
            feed.innerHTML = data.map(renderCard).join('');
        }

        document.getElementById('post-btn').addEventListener('click', async () => {
            const titleInput = document.getElementById('post-title');
            const contentInput = document.getElementById('post-content');
            const categorySelect = document.getElementById('post-category');
            const isUrgent = document.getElementById('urgent-toggle').checked;
            const postBtn = document.getElementById('post-btn');

            if (!titleInput.value.trim() || !contentInput.value.trim()) {
                alert('Please fill in both the title and content.');
                return;
            }

            postBtn.disabled = true;
            postBtn.textContent = 'Saving...';

            if (editTargetId) {
                const { error } = await supabase
                    .from('announcements')
                    .update({
                        title: titleInput.value.trim(),
                        content: contentInput.value.trim(),
                        category: categorySelect.value,
                        is_urgent: isUrgent
                    })
                    .eq('id', editTargetId);

                if (error) alert('Failed to update. Please try again.');
                editTargetId = null;
                postBtn.classList.remove('bg-green-600');
                postBtn.classList.add('bg-brand-blue');
            } else {
                const { error } = await supabase
                    .from('announcements')
                    .insert({
                        barangay_number: barangayNum,
                        title: titleInput.value.trim(),
                        content: contentInput.value.trim(),
                        category: categorySelect.value,
                        is_urgent: isUrgent
                    });

                if (error) alert('Failed to post. Please try again.');
            }

            titleInput.value = '';
            contentInput.value = '';
            categorySelect.value = 'General';
            document.getElementById('urgent-toggle').checked = false;
            postBtn.disabled = false;
            postBtn.textContent = 'Post Announcement';

            await loadAnnouncements();
        });

        document.getElementById('announcement-feed').addEventListener('click', async (e) => {
            const deleteBtn = e.target.closest('.delete-btn');
            const editBtn = e.target.closest('.edit-btn');

            if (deleteBtn) {
                if (!confirm('Are you sure you want to delete this announcement?')) return;
                const { error } = await supabase
                    .from('announcements')
                    .delete()
                    .eq('id', deleteBtn.dataset.id);
                if (error) { alert('Failed to delete.'); return; }
                await loadAnnouncements();
            }

            if (editBtn) {
                const { data, error } = await supabase
                    .from('announcements')
                    .select('*')
                    .eq('id', editBtn.dataset.id)
                    .single();
                if (error || !data) { alert('Could not load this announcement.'); return; }

                document.getElementById('post-title').value = data.title;
                document.getElementById('post-content').value = data.content || '';
                document.getElementById('post-category').value = data.category || 'General';
                document.getElementById('urgent-toggle').checked = data.is_urgent || false;

                editTargetId = data.id;
                const postBtn = document.getElementById('post-btn');
                postBtn.textContent = 'Save Changes';
                postBtn.classList.remove('bg-brand-blue');
                postBtn.classList.add('bg-green-600');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        // Auth guard
        const { data: { user } } = await supabase.auth.getUser();
        if (!user || user.user_metadata?.role !== 'admin') {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        }

        // Get admin's barangay number from their profile
        const { data: adminProfile } = await supabase
            .from('profiles')
            .select('barangay_code, barangay')
            .eq('id', user.id)
            .single();
        barangayNum = parseInt(adminProfile?.barangay_code?.split('-')[0])
            || parseInt((adminProfile?.barangay || '').replace(/\D/g, ''))
            || 74;

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        });

        loadAnnouncements();
    </script>
</body>
</html>
